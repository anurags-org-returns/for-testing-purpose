# Functional test for step-security/size-label-action.
# Fires on PRs created by size-label-action-trigger.yml (which uses a PAT so this
# workflow actually triggers). Runs size-label-action twice (against the requested
# action-tag via dynamic-uses, and against @main), then auto-closes the PR and
# deletes the branch.
name: size-label-action

on:
  pull_request:
    branches:
      - main
    paths:
      - 'testdata/size-label-action/test-change.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  size-label-action-dynamic:
    name: size-label-action (dynamic)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract action-tag from PR title
        id: extract-tag
        # PR title from trigger: "Test size-label-action <run-id> (N lines, ref=<tag>)"
        run: |
          TITLE='${{ github.event.pull_request.title }}'
          REF=$(printf '%s' "$TITLE" | sed -n 's/.*ref=\([^)]*\)).*/\1/p')
          if [ -z "$REF" ]; then
            echo "::error::Could not parse ref= from PR title: $TITLE"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Run size-label-action (dynamic tag)
        uses: step-security/dynamic-uses@v1
        with:
          uses: step-security/size-label-action@${{ steps.extract-tag.outputs.ref }}
          with: "{}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  size-label-action-main:
    name: size-label-action (main)
    runs-on: ubuntu-latest
    needs: size-label-action-dynamic
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run size-label-action (main)
        uses: step-security/size-label-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup - close PR and delete branch
    runs-on: ubuntu-latest
    needs: [size-label-action-dynamic, size-label-action-main]
    if: always()
    steps:
      - name: Close PR and delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          gh pr close "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --delete-branch \
            --comment "Functional test complete for size-label-action."
