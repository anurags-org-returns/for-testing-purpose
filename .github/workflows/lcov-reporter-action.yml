name: lcov-reporter-action

on:
  pull_request:
    branches:
      - main
    paths:
      - 'testdata/lcov-reporter-action/test-change.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  lcov-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run lcov-reporter-action
        uses: step-security/lcov-reporter-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./testdata/lcov-reporter-action

      - name: Verify comment was posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq 'length')
          echo "Comments on PR: $COMMENTS"
          if [ "$COMMENTS" -lt 1 ]; then
            echo "No comment found on PR!"
            exit 1
          fi

      - name: Cleanup - close PR and delete branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close ${{ github.event.pull_request.number }} --delete-branch || true
