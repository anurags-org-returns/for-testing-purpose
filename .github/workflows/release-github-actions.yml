name: release-github-actions

on:
  create:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release-test:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/test/v')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run release-github-actions
        uses: step-security/release-github-actions@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_TAG_PREFIX: test/
          CLEAN_TEST_TAG: true

      - name: Cleanup all test tags
        if: always()
        env:
          GH_TOKEN: ${{ secrets.TO_CREATE_TAG }}
        run: |
          echo "Waiting 10s for action to finish creating tags..."
          sleep 10
          echo "Deleting all test/* tags..."
          gh api "repos/${{ github.repository }}/git/matching-refs/tags/test/" --jq '.[].ref' | while read ref; do
            echo "Deleting ${ref}"
            gh api -X DELETE "repos/${{ github.repository }}/git/${ref}"
          done
